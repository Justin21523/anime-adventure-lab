# Anime-Adventure-Lab — Docker Compose (AMD ROCm host)
#
# Architecture:
#   - API + Redis + Frontend → containers (CPU-only)
#   - Celery workers → host conda env (uses ROCm GPU directly)
#
# To start workers on host:
#   source ~/miniconda3/etc/profile.d/conda.sh
#   conda activate rocm-pytorch-r9700
#   cd /mnt/c/ai_projects/anime-adventure-lab
#   bash scripts/run-worker.sh generation   # or postprocess, training
#
# Or use the all-in-one start:
#   bash start.sh

name: anime-adventure-lab

x-backend-env: &backend_env
  # Container-internal AI_WAREHOUSE roots (bind-mounted from host)
  AI_CACHE_ROOT: /warehouse/ai_cache
  AI_MODELS_ROOT: /warehouse/ai_models
  AI_OUTPUT_ROOT: /warehouse/ai_output
  HF_HOME: /warehouse/ai_cache/huggingface
  TRANSFORMERS_CACHE: /warehouse/ai_cache/huggingface
  TORCH_HOME: /warehouse/ai_cache/torch
  XDG_CACHE_HOME: /warehouse/ai_cache

  # Runtime wiring
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0

  # SQLite DB in outputs (override with DATABASE_URL for Postgres)
  DATABASE_URL: ${DATABASE_URL:-sqlite:////warehouse/ai_output/saga_forge.db}

  # Mock heavy models in API container (workers run real inference on host)
  T2I_MOCK: "1"
  VLM_MOCK: "1"
  LLM_MOCK: "1"

  # llama.cpp server (external, on host)
  LLM_BACKEND: llamacpp
  LLAMA_CPP_SERVER: "1"
  LLAMA_SERVER_URL: ${LLAMA_SERVER_URL:-http://host.docker.internal:8080}
  LLAMA_SERVER_TIMEOUT: "300"

x-backend-volumes: &backend_volumes
  - ${AI_CACHE_ROOT:-./warehouse/ai_cache}:/warehouse/ai_cache
  - ${AI_MODELS_ROOT:-./warehouse/ai_models}:/warehouse/ai_models
  - ${AI_OUTPUT_ROOT:-./warehouse/ai_output}:/warehouse/ai_output

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: ${BACKEND_REQUIREMENTS_FILE:-requirements-docker.txt}
    environment:
      <<: *backend_env
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_PREFIX: ${API_PREFIX:-/api/v1}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000,http://localhost}
    volumes: *backend_volumes
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: prod
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

