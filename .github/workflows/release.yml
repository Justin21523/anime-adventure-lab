name: Release
on:
  push:
    tags: ["v*.*.*"]
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release notes
        run: gh api repos/${GITHUB_REPOSITORY}/releases/generate-notes -f tag_name="${GITHUB_REF_NAME}" > release-notes.json
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish GitHub release
        run: |
          jq -r .body release-notes.json > release-notes.md
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
