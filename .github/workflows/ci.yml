name: Portfolio Demo Validation

on:
  push:
    branches: [main, develop]
    paths: ["portfolio-web/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["portfolio-web/**", ".github/workflows/ci.yml"]

permissions:
  contents: read

jobs:
  static-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate local demo assets
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          root = Path("portfolio-web")
          missing = []

          class Links(HTMLParser):
              def handle_starttag(self, _tag, attrs):
                  for name, value in attrs:
                      if name not in {"src", "href"} or not value:
                          continue
                      if value.startswith(("#", "http://", "https://", "mailto:")):
                          continue
                      path = root / value.split("#", 1)[0].removeprefix("./")
                      if not path.exists():
                          missing.append(str(path))

          parser = Links()
          parser.feed((root / "index.html").read_text(encoding="utf-8"))
          if missing:
              raise SystemExit(f"Missing portfolio assets: {missing}")
          screenshots = list((root / "assets").glob("screenshot-*.png"))
          if len(screenshots) < 7 or any(path.stat().st_size < 10_000 for path in screenshots):
              raise SystemExit("Real screenshot set is incomplete")
          video = root / "assets/demo-recording.mp4"
          if video.stat().st_size < 500_000:
              raise SystemExit("Demo recording is still a placeholder")
          print("Static portfolio assets are complete")
          PY
