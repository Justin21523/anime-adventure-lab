name: Scheduled AI Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

jobs:
  full-python-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AI_CACHE_ROOT: /tmp/anime-adventure-cache
      LLM_MOCK: "1"
      T2I_MOCK: "1"
      VLM_MOCK: "1"
      ENABLE_EXPERIMENTAL_ROUTERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked AI and development dependencies
        run: uv sync --frozen --all-extras --no-install-project
      - name: Run smoke suite without downloading models
        run: uv run --no-sync pytest -m smoke -q
      - name: Run maintained architecture tests
        run: >-
          uv run --no-sync pytest -q
          tests/test_phase1_foundation.py
          tests/test_persistence_foundation.py
          tests/test_story_v2_api.py
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-test-report
          path: test_results/
          if-no-files-found: ignore
