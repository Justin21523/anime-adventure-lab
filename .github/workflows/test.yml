name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend-foundation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      AI_CACHE_ROOT: /tmp/anime-adventure-cache
      DATABASE_URL: sqlite:////tmp/anime-adventure.db
      ENABLE_EXPERIMENTAL_ROUTERS: "0"
      LLM_MOCK: "1"
      STORY_RUNTIME_MODE: deterministic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked core and development dependencies
        run: uv sync --frozen --extra dev --no-install-project
      - name: Compile Python modules
        run: uv run --no-sync python -m compileall -q api core schemas workers scripts migrations
      - name: Lint refactored foundation
        run: >-
          uv run --no-sync ruff check
          api/main.py api/middleware.py api/dependencies.py api/routers/v2.py
          core/application core/persistence core/llm/runtime.py
          core/rag/engine.py core/rag/reranker.py schemas/v2.py
          workers/tasks/story_v2.py workers/tasks/rag_v2.py
          workers/tasks/maintenance_v2.py scripts/seed_demo.py
          scripts/benchmark_demo.py migrations
          tests/test_phase1_foundation.py tests/test_persistence_foundation.py
          tests/test_story_v2_api.py
          tests/test_object_store.py
      - name: Run deterministic foundation tests
        run: >-
          uv run --no-sync pytest -q --junitxml=reports/junit.xml
          --cov=core.application.story_service
          --cov=core.application.document_service
          --cov=core.application.job_service
          --cov=core.application.job_events
          --cov=core.application.rag_retrieval_service
          --cov=core.application.review_service
          --cov=core.application.world_service
          --cov=core.persistence
          --cov-report=json:reports/coverage.json --cov-fail-under=75
          tests/test_phase1_foundation.py
          tests/test_persistence_foundation.py
          tests/test_story_v2_api.py
          tests/test_object_store.py
      - uses: actions/upload-artifact@v4
        if: always() && matrix.python-version == '3.10'
        with:
          name: backend-verification-reports
          path: reports/
      - name: Render PostgreSQL migration SQL
        env:
          DATABASE_URL: postgresql://saga:ci@localhost/sagaforge
        run: uv run --no-sync alembic upgrade head --sql > /tmp/sagaforge-migration.sql
      - name: Verify lightweight import boundary
        run: |
          uv run --no-sync python - <<'PY'
          import sys
          from api.main import app
          assert app
          forbidden = {"transformers", "sentence_transformers", "diffusers", "core.llm.adapter"}
          loaded = forbidden.intersection(sys.modules)
          assert not loaded, f"heavy modules imported by API profile: {sorted(loaded)}"
          PY

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/react/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run type-check
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=high

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production Compose
        env:
          POSTGRES_PASSWORD: ci-postgres
          DATABASE_URL: postgresql://saga:ci-postgres@postgres:5432/sagaforge
          API_SECRET_KEY: ci-only-secret
          API_SESSION_SECRET: ci-only-session-secret
          API_ADMIN_PASSWORD_HASH: ci-placeholder-hash
          MINIO_USER: ci-minio
          MINIO_PASSWORD: ci-minio-secret
        run: >-
          docker compose -f docker-compose.prod.yml
          -f docker-compose.demo.yml config --quiet

  deterministic-compose-e2e:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres
      DATABASE_URL: postgresql://saga:ci-postgres@postgres:5432/sagaforge
      API_SECRET_KEY: ci-evidence-api-key
      API_SESSION_SECRET: ci-evidence-session-key
      API_ADMIN_PASSWORD_HASH: ci-placeholder-hash
      MINIO_USER: ci-minio
      MINIO_PASSWORD: ci-minio-secret
      DEMO_API_KEY: ci-evidence-api-key
      AI_CACHE_ROOT: /tmp/sagaforge/cache
      AI_MODELS_ROOT: /tmp/sagaforge/models
      AI_OUTPUT_ROOT: /tmp/sagaforge/output
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install httpx
      - name: Start isolated deterministic stack
        run: docker compose -p sagaforge-ci -f docker-compose.prod.yml -f docker-compose.demo.yml up -d --build --wait
      - name: Run recovery, RAG, review, and event-chain scenario
        run: python scripts/e2e_portfolio.py --compose-project sagaforge-ci --output reports/e2e.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compose-e2e-report
          path: reports/e2e.json
      - name: Dump service logs on failure
        if: failure()
        run: docker compose -p sagaforge-ci -f docker-compose.prod.yml -f docker-compose.demo.yml logs --no-color
      - name: Remove isolated stack
        if: always()
        run: docker compose -p sagaforge-ci -f docker-compose.prod.yml -f docker-compose.demo.yml down -v --remove-orphans
