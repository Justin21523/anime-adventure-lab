version: "3.9"
services:
  # React Frontend
  frontend:
    build:
      context: ../frontend/react
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - AI_CACHE_ROOT=/warehouse
      - API_CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ${AI_WAREHOUSE_HOST:-/mnt/c/AI_LLM_projects/ai_warehouse}:/warehouse
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - AI_CACHE_ROOT=/warehouse
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ${AI_WAREHOUSE_HOST:-/mnt/c/AI_LLM_projects/ai_warehouse}:/warehouse
    command: celery -A workers.celery_app:celery_app worker --loglevel=INFO
    depends_on:
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
