# configs/agent.yaml
# Agent Tools Configuration
# Defines available tools and their parameters for the agent system

tools:
  - name: calculator
    description: "Perform mathematical calculations and unit conversions"
    function_path: "core.agents.tools.calculator.calculate"
    function: "tools.calculator.calculate"
    category: "computation"
    requires_auth: false
    timeout_seconds: 10
    requires_sandbox: true
    parameters:
      expression:
        type: string
        description: "Mathematical expression to evaluate"
        required: true
        examples:
          - "2 + 2"
          - "sqrt(16)"
          - "3.14159 * 2^2"


  - name: basic_math
    description: "Perform basic mathematical operations"
    function: "tools.calculator.basic_math"
    category: "computation"
    requires_auth: false
    timeout_seconds: 5
    parameters:
      operation:
        type: string
        description: "Operation to perform"
        required: true
        enum: ["add", "subtract", "multiply", "divide", "power", "sqrt", "square", "cube", "abs", "log", "log10", "sin", "cos", "tan"]
      a:
        type: number
        description: "First number"
        required: true
      b:
        type: number
        description: "Second number (optional for unary operations)"
        required: false

  - name: percentage
    description: "Calculate percentage of a value"
    function: "tools.calculator.percentage"
    category: "computation"
    requires_auth: false
    timeout_seconds: 5
    parameters:
      value:
        type: number
        description: "Base value"
        required: true
      percent:
        type: number
        description: "Percentage to calculate"
        required: true

  - name: unit_convert
    description: "Convert between different units"
    function: "tools.calculator.unit_convert"
    category: "computation"
    requires_auth: false
    timeout_seconds: 5
    parameters:
      value:
        type: number
        description: "Value to convert"
        required: true
      from_unit:
        type: string
        description: "Source unit"
        required: true
        examples: ["mm", "cm", "m", "km", "inch", "ft", "yard", "mile", "mg", "g", "kg", "oz", "lb", "celsius", "fahrenheit", "kelvin"]
      to_unit:
        type: string
        description: "Target unit"
        required: true

  - name: web_search
    description: "Search the web for information (Brave API)"
    function_path: "core.agents.tools.web_search.brave_search"
    function: "core.agents.tools.web_search.brave_search"
    category: "information"
    requires_auth: true
    timeout_seconds: 30
    parameters:
      query:
        type: string
        description: "Search query"
        required: true
        min_length: 1
        max_length: 200
      max_results:
        type: integer
        description: "Maximum number of results to return"
        required: false
        default: 5
        minimum: 1
        maximum: 20
      api_key:
        type: string
        description: "Brave search API key; uses BRAVE_SEARCH_API_KEY if omitted"
        required: false

  - name: web_search_summary
    description: "Search the web and provide summarized results (Brave + LLM summary)"
    function_path: "core.agents.tools.web_search.brave_search_summary"
    function: "core.agents.tools.web_search.brave_search_summary"
    category: "information"
    requires_auth: true
    timeout_seconds: 45
    parameters:
      query:
        type: string
        description: "Search query"
        required: true
        min_length: 1
        max_length: 200
      max_results:
        type: integer
        description: "Maximum results to consider for summary"
        required: false
        default: 3
        minimum: 1
        maximum: 10
      api_key:
        type: string
        description: "Brave search API key; uses BRAVE_SEARCH_API_KEY if omitted"
        required: false

  - name: rag_search
    description: "Search RAG index for contextual snippets"
    function_path: "core.agents.tools.rag_search.rag_search"
    function: "core.agents.tools.rag_search.rag_search"
    category: "knowledge"
    requires_auth: false
    timeout_seconds: 20
    parameters:
      query:
        type: string
        description: "Query text"
        required: true
      top_k:
        type: integer
        description: "Top K results"
        required: false
        default: 5
        minimum: 1
        maximum: 20

  - name: file_list
    description: "List files and directories"
    function: "tools.file_ops.list_files"
    category: "file_system"
    requires_auth: false
    timeout_seconds: 15
    parameters:
      path:
        type: string
        description: "Directory path to list"
        required: false
        default: "."
      pattern:
        type: string
        description: "File pattern filter (e.g., *.txt, *.py)"
        required: false
        default: "*"

  - name: file_read
    description: "Read file content safely"
    function_path: "core.agents.tools.file_ops.read_file"
    function: "core.agents.tools.file_ops.read_file"
    category: "file_system"
    requires_auth: false
    timeout_seconds: 30
    parameters:
      file_path:
        type: string
        description: "Path to file to read"
        required: true
      encoding:
        type: string
        description: "Text encoding"
        required: false
        default: "utf-8"
        enum: ["utf-8", "ascii", "latin1", "cp1252"]
      max_lines:
        type: integer
        description: "Maximum lines to read"
        required: false
        default: 1000
        minimum: 1
        maximum: 10000

  - name: file_write
    description: "Write content to file safely"
    function_path: "core.agents.tools.file_ops.write_file"
    function: "core.agents.tools.file_ops.write_file"
    category: "file_system"
    requires_auth: true
    timeout_seconds: 30
    parameters:
      file_path:
        type: string
        description: "Path to file to write"
        required: true
      content:
        type: string
        description: "Content to write"
        required: true
      encoding:
        type: string
        description: "Text encoding"
        required: false
        default: "utf-8"
      overwrite:
        type: boolean
        description: "Whether to overwrite existing files"
        required: false
        default: false

  - name: file_exists
    description: "Check if file exists and get basic info"
    function_path: "core.agents.tools.file_ops.file_exists"
    function: "core.agents.tools.file_ops.file_exists"
    category: "file_system"
    requires_auth: false
    timeout_seconds: 5
    parameters:
      file_path:
        type: string
        description: "Path to check"
        required: true

  - name: create_directory
    description: "Create directory safely"
    function_path: "core.agents.tools.file_ops.create_directory"
    function: "core.agents.tools.file_ops.create_directory"
    category: "file_system"
    requires_auth: true
    timeout_seconds: 10
    parameters:
      dir_path:
        type: string
        description: "Directory path to create"
        required: true
      parents:
        type: boolean
        description: "Create parent directories if needed"
        required: false
        default: true

# Agent behavior configuration
agent_settings:
  # Default agent parameters
  default_max_iterations: 5
  default_max_tools_per_iteration: 2
  default_timeout_seconds: 300
  enable_chain_of_thought: true

  # Safety settings
  max_file_size_mb: 100
  allowed_file_extensions: [".txt", ".md", ".json", ".yaml", ".yml", ".csv", ".tsv", ".log"]
  blocked_file_extensions: [".exe", ".bat", ".cmd", ".com", ".scr", ".vbs", ".js"]

  # Tool execution limits
  max_concurrent_tools: 3
  max_tools_per_task: 10
  max_execution_time_seconds: 600

  # Multi-step task settings
  max_task_steps: 20
  max_parallel_steps: 3
  task_timeout_seconds: 1800  # 30 minutes

  # Story agent settings
  story_agents:
    narrative:
      max_iterations: 3
      enable_reasoning: true
      narrative_styles: ["adventure", "mystery", "sci-fi", "fantasy", "horror", "comedy"]

    dialogue:
      max_iterations: 2
      enable_reasoning: true
      conversation_styles: ["formal", "casual", "dramatic", "humorous", "serious"]

    world:
      max_iterations: 4
      enable_reasoning: true
      detail_levels: ["brief", "detailed", "comprehensive"]

    action:
      max_iterations: 3
      enable_reasoning: true
      action_types: ["combat", "skill_check", "exploration", "social"]

# Tool categories for organization
tool_categories:
  computation:
    description: "Mathematical calculations and data processing"
    tools: ["calculator", "basic_math", "percentage", "unit_convert"]

  information:
    description: "Information gathering and research"
    tools: ["web_search", "web_search_summary", "rag_search"]

  file_system:
    description: "File and directory operations"
    tools: ["file_list", "file_read", "file_write", "file_exists", "create_directory"]

  communication:
    description: "Communication and messaging tools"
    tools: []  # Can be extended with email, SMS, etc.

  creative:
    description: "Creative and content generation tools"
    tools: []  # Can be extended with image generation, text generation, etc.

# Security policies
security:
  # File system access restrictions
  allowed_directories:
    - "."
    - "./data"
    - "./temp"
    - "./outputs"
    - "./cache"
    - "./user_files"

  # Network access restrictions
  allowed_domains:
    - "google.com"
    - "wikipedia.org"
    - "github.com"
    - "stackoverflow.com"

  # Content filtering
  enable_content_filter: true
  blocked_keywords:
    - "password"
    - "secret"
    - "private_key"
    - "api_key"

  # Rate limiting
  max_requests_per_minute: 60
  max_requests_per_hour: 1000

# Logging and monitoring
logging:
  log_tool_execution: true
  log_agent_reasoning: true
  log_file_operations: true
  log_web_requests: true

  # Log levels for different components
  log_levels:
    tool_registry: "INFO"
    agent_executor: "INFO"
    multi_step_processor: "INFO"
    story_integration: "INFO"

# Performance tuning
performance:
  # Caching settings
  enable_tool_result_cache: true
  cache_timeout_seconds: 3600

  # Memory management
  max_memory_mb: 2048
  cleanup_interval_seconds: 300

  # Concurrency settings
  thread_pool_size: 4
  async_timeout_seconds: 30

# Safety settings
safety:
  sandbox_mode: true
  allowed_file_extensions: [".txt", ".json", ".csv", ".md", ".py", ".yaml", ".yml", ".log"]
  max_file_size_mb: 1
  blocked_patterns:
    - "import os"
    - "import subprocess"
    - "exec("
    - "eval("
    - "__import__"
    - "open("
    - "../"
    - "~/"
    - "/etc/"
    - "/usr/"
    - "/var/"
