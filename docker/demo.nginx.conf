server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Inject a consistent "Back to Portfolio" link (top-right).
  location ~* \.html$ {
    sub_filter_types text/html;
    sub_filter_once on;
    sub_filter '</head>' '<style>\n.portfolio-back-link{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.85);color:#fff;text-decoration:none;font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.2)}\n.portfolio-back-link:hover{background:rgba(15,23,42,.95)}\n</style></head>';
    sub_filter '</body>' '<a class="portfolio-back-link" href="https://neojustin.dothost.net/projects/anime-adventure-lab">回到作品集</a></body>';

    try_files $uri =404;
  }

  # API proxy (FastAPI). External: /p/anime-adventure-lab/api/v1/*
  # Upstream receives: /api/v1/*
  location ^~ /api/v1/ {
    proxy_pass http://anime-adventure-lab-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static-only (avoid SPA fallback masking missing assets).
  location ~* \.(?:css|js|mjs|map|json|txt|xml|png|jpg|jpeg|gif|webp|svg|ico|wasm)$ {
    try_files $uri =404;
  }

  location / {
    sub_filter_types text/html;
    sub_filter_once on;
    sub_filter '</head>' '<style>\n.portfolio-back-link{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 12px;border-radius:12px;background:rgba(15,23,42,.85);color:#fff;text-decoration:none;font:600 13px/1 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.2)}\n.portfolio-back-link:hover{background:rgba(15,23,42,.95)}\n</style></head>';
    sub_filter '</body>' '<a class="portfolio-back-link" href="https://neojustin.dothost.net/projects/anime-adventure-lab">回到作品集</a></body>';

    try_files $uri $uri/ =404;
  }
}
